name: Build RINKAN UMIS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-14
            platform: macos-arm
          - os: macos-13
            platform: macos-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet[build]==0.27.6"
          pip install -r requirements.txt

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Flet app
        env:
          PYTHONUTF8: 1
          PYTHONIOENCODING: utf-8
        run: |
          # ディレクトリ構造を確認（デバッグ用）
          ls -R
          # バージョン名に関わらずメインスクリプトを main.py にコピー
          cp rinkan_umis_v*.py main.py
          # カレントディレクトリ (.) を明示的に指定してビルド
          flet build ${{ matrix.os == 'windows-latest' && 'windows' || 'macos' }} . --product "RINKAN_UMIS" --verbose

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RINKAN_UMIS-${{ matrix.platform }}
          path: |
            build/windows
            build/macos
